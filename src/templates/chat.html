<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo-icon">
          <img src="{{ url_for('static', filename='capybara-logo.svg') }}" alt="Logo" style="width: 26px; height: 26px;">
        </div>
        <div>
          <div class="logo-title">artiste</div>
          <div class="logo-subtitle">Powered by Gemini</div>
        </div>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="theme-toggle" title="Toggle dark mode">
          <span class="material-symbols-rounded">light_mode</span>
        </button>
      </div>
    </header>

    <!-- Chat Area -->
    <div class="chat-area" id="chat-area">
      <div class="messages-container" id="messages">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">
            <span class="material-symbols-rounded">chat</span>
          </div>
          <h2>What can I help with?</h2>
          <p>Ask me anything or upload a document and I'll answer questions about it.</p>
          <div class="suggestions">
            <button class="suggestion-chip" data-prompt="Summarize a document for me">Summarize a document</button>
            <button class="suggestion-chip" data-prompt="Explain how RAG works">How does RAG work?</button>
            <button class="suggestion-chip" data-prompt="What can you help me with?">What can you do?</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-wrapper">
        <div class="file-preview" id="file-preview">
          <span class="material-symbols-rounded">description</span>
          <span class="file-preview-name" id="file-preview-name"></span>
          <button class="file-remove" id="file-remove" title="Remove file">
            <span class="material-symbols-rounded" style="font-size:18px;">close</span>
          </button>
        </div>
        <div class="input-box">
          <textarea id="message-input" placeholder="Ask anything..." rows="1" autofocus></textarea>
          <input type="file" id="file-input" accept=".pdf,.txt,.md,.csv,.doc,.docx">
          <div class="input-actions">
            <button class="action-btn" id="file-upload-btn" title="Upload file">
              <span class="material-symbols-rounded">attach_file</span>
            </button>
            <button class="action-btn send-btn" id="send-btn" title="Send message">
              <span class="material-symbols-rounded">arrow_upward</span>
            </button>
          </div>
        </div>
        <div class="footer-hint">RAG Chatbot may make mistakes. Verify important information.</div>
      </div>
    </div>
  </div>

  <script>
    // DOM
    const chatArea = document.getElementById('chat-area');
    const messages = document.getElementById('messages');
    const input = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const fileInput = document.getElementById('file-input');
    const fileUploadBtn = document.getElementById('file-upload-btn');
    const filePreview = document.getElementById('file-preview');
    const filePreviewName = document.getElementById('file-preview-name');
    const fileRemoveBtn = document.getElementById('file-remove');
    const themeToggle = document.getElementById('theme-toggle');
    const welcome = document.getElementById('welcome');

    let currentFile = null;

    // Theme 
    const saved = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    setThemeIcon(saved);

    themeToggle.addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      setThemeIcon(next);
    });

    function setThemeIcon(t) {
      themeToggle.querySelector('.material-symbols-rounded').textContent =
        t === 'light' ? 'dark_mode' : 'light_mode';
    }

    // Auto-resize
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 160) + 'px';
      sendBtn.classList.toggle('active', input.value.trim().length > 0 || currentFile);
    });

    // File upload 
    fileUploadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      const f = fileInput.files[0];
      if (!f) return;
      currentFile = f;
      filePreviewName.textContent = f.name;
      filePreview.classList.add('active');
      sendBtn.classList.add('active');
    });

    fileRemoveBtn.addEventListener('click', () => {
      currentFile = null;
      fileInput.value = '';
      filePreview.classList.remove('active');
      sendBtn.classList.toggle('active', input.value.trim().length > 0);
    });

    // Send 
    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    function send() {
      const text = input.value.trim();
      if (!text && !currentFile) return;

      if (welcome) welcome.style.display = 'none';

      const fname = currentFile ? currentFile.name : null;
      addMsg('user', text, fname);

      input.value = '';
      input.style.height = 'auto';
      sendBtn.classList.remove('active');

      const fileSending = currentFile;
      currentFile = null;
      fileInput.value = '';
      filePreview.classList.remove('active');

      const typing = addTyping();
      fetchReply(text, fileSending, typing);
    }

    // Suggestion chips 
    document.querySelectorAll('.suggestion-chip').forEach(c => {
      c.addEventListener('click', () => {
        input.value = c.dataset.prompt;
        input.dispatchEvent(new Event('input'));
        send();
      });
    });

    // Add message 
    function addMsg(role, text, fileName) {
      const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const av = role === 'user' ? 'N' : 'R';

      let fileHTML = '';
      if (fileName) {
        fileHTML = `<div class="msg-file-badge">
          <span class="material-symbols-rounded">description</span>
          <span class="file-name">${esc(fileName)}</span>
        </div>`;
      }

      const html = `
        <div class="message ${role}">
          <div class="msg-avatar">${av}</div>
          <div class="msg-content">
            ${role === 'user' && fileHTML ? fileHTML : ''}
            <div class="msg-bubble">${esc(text)}</div>
            <div class="msg-time">${t}</div>
          </div>
        </div>`;
      messages.insertAdjacentHTML('beforeend', html);
      scroll();
    }

    // Typing indicator
    function addTyping() {
      const html = `
        <div class="message bot" id="typing-msg">
          <div class="msg-avatar">R</div>
          <div class="msg-content">
            <div class="msg-bubble">
              <div class="typing-indicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
              </div>
            </div>
          </div>
        </div>`;
      messages.insertAdjacentHTML('beforeend', html);
      scroll();
      return document.getElementById('typing-msg');
    }

    // Fetch response from Flask 
    async function fetchReply(text, file, typingEl) {
      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            file_name: file ? file.name : null,
          }),
        });
        const data = await res.json();
        if (typingEl) typingEl.remove();
        addMsg('bot', data.response || data.error || 'No response.');
      } catch (err) {
        if (typingEl) typingEl.remove();
        addMsg('bot', 'Could not reach the server. Is it running on localhost:5000?');
      }
    }

    // Helpers 
    function scroll() {
      requestAnimationFrame(() => {
        chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
      });
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
